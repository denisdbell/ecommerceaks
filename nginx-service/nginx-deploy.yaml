apiVersion: v1
kind: Namespace
metadata:
  name: mynginx
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: myconfigmap
  labels:
    app: mynginx
data:
  my-key: my-value
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mynginx-deployment
  labels:   
    app: mynginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mynginx
  template:
    metadata:
      labels:
        app: mynginx
    spec:
      containers:
      - name: mynginx-container
        image: nginx:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        env:
        - name: MY_ENV_VAR
          valueFrom:
            configMapKeyRef:
              name: myconfigmap
              key: my-key

---
apiVersion: v1
kind: Service
metadata:
  name: mynginx-service
  labels:
    app: mynginx
spec:
  type: ClusterIP
  selector:
    app: mynginx
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80