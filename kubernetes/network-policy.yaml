# kubernetes/security/network-policy.yaml
# order-service only accepts traffic from api-gateway — nothing else
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-gateway-only
  namespace: order-service
spec:
  podSelector: {}         # applies to ALL pods in order-service namespace
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          app: api-gateway    # only the api-gateway namespace can send traffic in